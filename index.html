<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Safari home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Drovik" />
    <link rel="apple-touch-icon" href="/drovik-fitness/apple-touch-icon.png" />

    <!-- Browser tab -->
    <link rel="icon" type="image/png" sizes="512x512" href="/drovik-fitness/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/drovik-fitness/icon-192.png" />

    <title>Drovik Fitness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Start fetching splash early -->
    <link rel="preload" href="./splash.html" as="fetch" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>

    <script>
      (function () {
        // ── Splash host ──────────────────────────────────────────────────
        var host = document.createElement('div');
        host.style.cssText = [
          'position:fixed', 'top:0', 'left:0', 'right:0', 'bottom:0',
          'z-index:9999', 'background:#050505', 'overflow:hidden'
        ].join(';');
        document.body.appendChild(host);

        var styleEl = null;
        var done    = false;

        // ── Dismiss: fade-to-black (200ms) → remove splash → fade-from-black (350ms) ──
        function dismiss() {
          if (done) return;
          done = true;

          var overlay = document.createElement('div');
          overlay.style.cssText = [
            'position:fixed', 'top:0', 'left:0', 'right:0', 'bottom:0',
            'z-index:10000', 'background:#050505', 'opacity:0', 'pointer-events:none'
          ].join(';');
          document.body.appendChild(overlay);

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              overlay.style.transition = 'opacity 400ms ease';
              overlay.style.opacity   = '1';

              setTimeout(function () {
                if (host.parentNode)   host.parentNode.removeChild(host);
                if (styleEl && styleEl.parentNode) styleEl.parentNode.removeChild(styleEl);

                overlay.style.transition = 'opacity 600ms ease';
                overlay.style.opacity    = '0';

                setTimeout(function () {
                  if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
                }, 600);
              }, 400);
            });
          });
        }

        // Listen for completion event from splash (custom event + postMessage fallback)
        window.addEventListener('drovik:splash-complete', dismiss);
        window.addEventListener('message', function (e) {
          if (e.data && e.data.type === 'drovik:splash-complete') dismiss();
        });

        // Hard fallback: dismiss after 12 s regardless (10 s animation + 2 s buffer)
        setTimeout(dismiss, 12000);

        // ── Fetch and inject splash.html ─────────────────────────────────
        fetch('./splash.html')
          .then(function (r) { return r.text(); })
          .then(function (html) {
            var doc = new DOMParser().parseFromString(html, 'text/html');

            // Inject splash CSS into <head>
            var css = Array.from(doc.querySelectorAll('style'))
              .map(function (s) { return s.textContent || ''; })
              .join('\n');
            styleEl = document.createElement('style');
            styleEl.textContent = css;
            document.head.appendChild(styleEl);

            // Inject splash HTML into the host div
            host.innerHTML = doc.body.innerHTML;

            // Force a synchronous layout so the browser applies the injected CSS
            // before the WebGL script runs — fixes canvas dimensions on iOS.
            void host.offsetHeight;

            // One rAF gives the GPU a chance to composite the new layout
            // before we ask for a WebGL context.
            requestAnimationFrame(function () {
              Array.from(doc.querySelectorAll('script')).forEach(function (orig) {
                var s = document.createElement('script');
                s.textContent = orig.textContent || '';
                host.appendChild(s);
              });
            });
          })
          .catch(dismiss);
      })();
    </script>

    <!-- Restore saved mode before React paints (prevents flash) -->
    <script>
      (function () {
        try {
          var T = {
            carbon: {
              a:'#FBBF24', ad:'#D97706', ax:'#B45309', al:'#1C1400', label:'#FBBF24',
              bg:'#111115', card:'#1C1C22', raised:'#252530', border:'#303038', borderSubtle:'#28282E',
              text:'#EDEDF2', muted:'#9090A0', faint:'#3C3C48', disabled:'#2C2C38',
              successBg:'#0F2818', successText:'#22C55E', infoBg:'#0A1830', infoText:'#60A5FA',
              warningBg:'#1E1608', warningText:'#FBBF24', errorBg:'#1E0A10', errorText:'#F87171',
              neutralBg:'#130E20', neutralText:'#A78BFA',
              iconTile:'#F5F0E4', iconTileMuted:'#DDD6C7', iconTileDeep:'#BFB4A4', dark:true
            },
            arctic: {
              a:'#4F46E5', ad:'#4338CA', ax:'#312E81', al:'#EEF2FF', label:'#4338CA',
              bg:'#FAFAFD', card:'#FFFFFF', raised:'#F6F7FC', border:'#E3E5F0', borderSubtle:'#EEF0F6',
              text:'#17172F', muted:'#5D6187', faint:'#C6C9DB', disabled:'#B8BCCE',
              successBg:'#F0FDF4', successText:'#15803D', infoBg:'#EEF2FF', infoText:'#4338CA',
              warningBg:'#FFFBEB', warningText:'#B45309', errorBg:'#FEF2F2', errorText:'#B91C1C',
              neutralBg:'#F5F3FF', neutralText:'#4F46E5',
              iconTile:'#FFFFFF', iconTileMuted:'#EEF0F6', iconTileDeep:'#DDE2EE', dark:false
            },
          };
          var id = localStorage.getItem('drovik:theme') || 'carbon';
          var t  = T[id] || T.carbon;
          var s  = document.documentElement.style;
          var vars = {
            '--color-accent': t.a,
            '--color-accent-dark': t.ad,
            '--color-accent-darker': t.ax,
            '--color-accent-light': t.al,
            '--color-accent-label': t.label,
            '--color-app-bg': t.bg,
            '--color-app-card': t.card,
            '--color-app-raised': t.raised,
            '--color-app-border': t.border,
            '--color-app-border-subtle': t.borderSubtle,
            '--color-app-text': t.text,
            '--color-app-muted': t.muted,
            '--color-app-faint': t.faint,
            '--color-app-disabled': t.disabled,
            '--color-success-bg': t.successBg,
            '--color-success-text': t.successText,
            '--color-info-bg': t.infoBg,
            '--color-info-text': t.infoText,
            '--color-warning-bg': t.warningBg,
            '--color-warning-text': t.warningText,
            '--color-error-bg': t.errorBg,
            '--color-error-text': t.errorText,
            '--color-neutral-bg': t.neutralBg,
            '--color-neutral-text': t.neutralText,
            '--color-icon-tile': t.iconTile,
            '--color-icon-tile-muted': t.iconTileMuted,
            '--color-icon-tile-deep': t.iconTileDeep,
            '--muscle-body': t.dark ? '#4A4A52' : '#C8C8DC',
            '--muscle-hi': t.a
          };
          Object.keys(vars).forEach(function (name) {
            s.setProperty(name, vars[name]);
          });
          document.documentElement.classList.toggle('dark-theme', !!t.dark);
        } catch (e) {}
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
