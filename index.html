<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Safari home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Drovik" />
    <link rel="apple-touch-icon" href="/drovik-fitness/apple-touch-icon.png" />

    <!-- Browser tab -->
    <link rel="icon" type="image/png" sizes="512x512" href="/drovik-fitness/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/drovik-fitness/icon-192.png" />

    <title>Drovik Fitness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Start fetching splash early -->
    <link rel="preload" href="./splash.html" as="fetch" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>

    <script>
      (function () {
        // ── Splash host ──────────────────────────────────────────────────
        var host = document.createElement('div');
        host.style.cssText = [
          'position:fixed', 'top:0', 'left:0', 'right:0', 'bottom:0',
          'z-index:9999', 'background:#050505', 'overflow:hidden'
        ].join(';');
        document.body.appendChild(host);

        var styleEl = null;
        var done    = false;

        // ── Dismiss: fade-to-black (200ms) → remove splash → fade-from-black (350ms) ──
        function dismiss() {
          if (done) return;
          done = true;

          var overlay = document.createElement('div');
          overlay.style.cssText = [
            'position:fixed', 'top:0', 'left:0', 'right:0', 'bottom:0',
            'z-index:10000', 'background:#050505', 'opacity:0', 'pointer-events:none'
          ].join(';');
          document.body.appendChild(overlay);

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              overlay.style.transition = 'opacity 400ms ease';
              overlay.style.opacity   = '1';

              setTimeout(function () {
                if (host.parentNode)   host.parentNode.removeChild(host);
                if (styleEl && styleEl.parentNode) styleEl.parentNode.removeChild(styleEl);

                overlay.style.transition = 'opacity 600ms ease';
                overlay.style.opacity    = '0';

                setTimeout(function () {
                  if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
                }, 600);
              }, 400);
            });
          });
        }

        // Listen for completion event from splash (custom event + postMessage fallback)
        window.addEventListener('drovik:splash-complete', dismiss);
        window.addEventListener('message', function (e) {
          if (e.data && e.data.type === 'drovik:splash-complete') dismiss();
        });

        // Hard fallback: dismiss after 12 s regardless (10 s animation + 2 s buffer)
        setTimeout(dismiss, 12000);

        // ── Fetch and inject splash.html ─────────────────────────────────
        fetch('./splash.html')
          .then(function (r) { return r.text(); })
          .then(function (html) {
            var doc = new DOMParser().parseFromString(html, 'text/html');

            // Inject splash CSS into <head>
            var css = Array.from(doc.querySelectorAll('style'))
              .map(function (s) { return s.textContent || ''; })
              .join('\n');
            styleEl = document.createElement('style');
            styleEl.textContent = css;
            document.head.appendChild(styleEl);

            // Inject splash HTML into the host div
            host.innerHTML = doc.body.innerHTML;

            // Force a synchronous layout so the browser applies the injected CSS
            // before the WebGL script runs — fixes canvas dimensions on iOS.
            void host.offsetHeight;

            // One rAF gives the GPU a chance to composite the new layout
            // before we ask for a WebGL context.
            requestAnimationFrame(function () {
              Array.from(doc.querySelectorAll('script')).forEach(function (orig) {
                var s = document.createElement('script');
                s.textContent = orig.textContent || '';
                host.appendChild(s);
              });
            });
          })
          .catch(dismiss);
      })();
    </script>

    <!-- Restore saved colour theme before React paints (prevents flash) -->
    <script>
      (function () {
        try {
          var T = {
            gold:     { a:'#FFCA10',ad:'#B8900A',ax:'#8A6C00',al:'#FFF9E0', bg:'#F4F6F9',card:'#FFFFFF',border:'#E3E5E5',text:'#241F20',muted:'#7A7980',faint:'#C8C8C8',dark:false },
            onyx:     { a:'#FFCA10',ad:'#B8900A',ax:'#8A6C00',al:'#1E1A08', bg:'#0C0D0F',card:'#161819',border:'#252729',text:'#F0EFE8',muted:'#8B8A87',faint:'#3E3D3A',dark:true  },
            midnight: { a:'#4F90FF',ad:'#2563EB',ax:'#1D4ED8',al:'#0D1A3A', bg:'#080D1C',card:'#0E1630',border:'#1A2545',text:'#EEF2FF',muted:'#8B9CC8',faint:'#2A3552',dark:true  },
            ember:    { a:'#FF6B2C',ad:'#CC4F15',ax:'#A33A0A',al:'#1E0E05', bg:'#0F0A07',card:'#1A1209',border:'#2E1E0E',text:'#FFF0E8',muted:'#A08070',faint:'#3D2518',dark:true  },
            arctic:   { a:'#4F46E5',ad:'#3730A3',ax:'#2C278A',al:'#EEF2FF', bg:'#F0F4FF',card:'#FFFFFF',border:'#D8E2FF',text:'#1E1B4B',muted:'#6366A0',faint:'#C4C7D4',dark:false },
            sage:     { a:'#16A34A',ad:'#15803D',ax:'#0F6030',al:'#DCFCE7', bg:'#F2F5F1',card:'#FFFFFF',border:'#D0DECA',text:'#1A2C1A',muted:'#5D7A5D',faint:'#B8C8B4',dark:false },
          };
          var id = localStorage.getItem('drovik:theme') || 'gold';
          var t  = T[id] || T.gold;
          var s  = document.documentElement.style;
          s.setProperty('--color-accent',        t.a);
          s.setProperty('--color-accent-dark',   t.ad);
          s.setProperty('--color-accent-darker', t.ax);
          s.setProperty('--color-accent-light',  t.al);
          s.setProperty('--color-app-bg',        t.bg);
          s.setProperty('--color-app-card',      t.card);
          s.setProperty('--color-app-border',    t.border);
          s.setProperty('--color-app-text',      t.text);
          s.setProperty('--color-app-muted',     t.muted);
          s.setProperty('--color-app-faint',     t.faint);
          if (t.dark) document.documentElement.classList.add('dark-theme');
        } catch (e) {}
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
