<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Safari home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Drovik" />
    <link rel="apple-touch-icon" href="/drovik-fitness/apple-touch-icon.png" />

    <!-- Browser tab -->
    <link rel="icon" type="image/png" sizes="512x512" href="/drovik-fitness/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/drovik-fitness/icon-192.png" />

    <title>Drovik Fitness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  </head>
  <body>
    <div id="root"></div>

    <!-- Restore saved mode before React paints (prevents flash) -->
    <script>
      (function () {
        try {
          var T = {
            carbon: {
              a:'#FF7A00', ad:'#EA580C', ax:'#9A3412', al:'#261003', label:'#FF7A00',
              bg:'#02070B', card:'#07111A', raised:'#0C1824', border:'#243545', borderSubtle:'#162432',
              text:'#F8FAFC', muted:'#A9B4C0', faint:'#4B5D6D', disabled:'#263545',
              successBg:'#0A2010', successText:'#22C55E', infoBg:'#031B2C', infoText:'#00A8FF',
              warningBg:'#261003', warningText:'#FF9A1F', errorBg:'#250A0A', errorText:'#F87171',
              neutralBg:'#061728', neutralText:'#38BDF8', icon:'saturate(1)',
              iconTile:'#F5F0E4', iconTileMuted:'#DDD6C7', iconTileDeep:'#BFB4A4', dark:true
            },
            arctic: {
              a:'#FF6B00', ad:'#EA580C', ax:'#C2410C', al:'#FFF1E6', label:'#F25A00',
              bg:'#F8FBFF', card:'#FFFFFF', raised:'#F0F5FB', border:'#D6E0EA', borderSubtle:'#E8EEF5',
              text:'#101827', muted:'#4B5565', faint:'#AAB6C4', disabled:'#C6D0DB',
              successBg:'#F0FDF4', successText:'#15803D', infoBg:'#E6F6FF', infoText:'#0078E7',
              warningBg:'#FFF1E6', warningText:'#EA580C', errorBg:'#FEF2F2', errorText:'#B91C1C',
              neutralBg:'#EAF6FF', neutralText:'#0284C7', icon:'saturate(1)',
              iconTile:'#FFFFFF', iconTileMuted:'#EEF3F8', iconTileDeep:'#DCE5EF', dark:false
            },
          };
          var id = localStorage.getItem('drovik:theme') || 'carbon';
          var t  = T[id] || T.carbon;
          var s  = document.documentElement.style;
          var vars = {
            '--color-accent': t.a,
            '--color-accent-dark': t.ad,
            '--color-accent-darker': t.ax,
            '--color-accent-light': t.al,
            '--color-accent-label': t.label,
            '--color-app-bg': t.bg,
            '--color-app-card': t.card,
            '--color-app-raised': t.raised,
            '--color-app-border': t.border,
            '--color-app-border-subtle': t.borderSubtle,
            '--color-app-text': t.text,
            '--color-app-muted': t.muted,
            '--color-app-faint': t.faint,
            '--color-app-disabled': t.disabled,
            '--color-success-bg': t.successBg,
            '--color-success-text': t.successText,
            '--color-info-bg': t.infoBg,
            '--color-info-text': t.infoText,
            '--color-warning-bg': t.warningBg,
            '--color-warning-text': t.warningText,
            '--color-error-bg': t.errorBg,
            '--color-error-text': t.errorText,
            '--color-neutral-bg': t.neutralBg,
            '--color-neutral-text': t.neutralText,
            '--color-icon-tile': t.iconTile,
            '--color-icon-tile-muted': t.iconTileMuted,
            '--color-icon-tile-deep': t.iconTileDeep,
            '--muscle-body': t.dark ? '#4A4A52' : '#C8C8DC',
            '--muscle-hi': t.a,
            '--premium-icon-filter': t.icon
          };
          Object.keys(vars).forEach(function (name) {
            s.setProperty(name, vars[name]);
          });
          document.documentElement.classList.toggle('dark-theme', !!t.dark);
        } catch (e) {}
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
