<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />

    <!--
      width=device-width  — render at the phone's native pixel width, not a desktop width.
      initial-scale=1.0   — don't zoom in or out on first load.
      viewport-fit=cover  — let the app draw behind the iPhone notch / home bar so
                            we can handle the safe-area ourselves with CSS env().
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Safari home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Drovik" />
    <link rel="apple-touch-icon" href="/drovik-fitness/icon.svg" />

    <!-- Browser tab -->
    <link rel="icon" type="image/svg+xml" href="/drovik-fitness/icon.svg" />

    <title>Drovik Fitness</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
