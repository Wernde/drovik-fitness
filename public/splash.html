<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Drovik Fitness Splash</title>
<style>
  :root {
    --gold-1: #84510f;
    --gold-2: #c88723;
    --gold-3: #f2c35d;
    --gold-4: #fff1b6;
    --logo-w: min(88vw, 1040px);
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #050505;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    min-height: 100dvh;
    color: #fff;
  }

  #splash {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    isolation: isolate;
    background: #050505;
  }

  #gl-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }

  #ambient-vignette {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 45%, rgba(242, 195, 93, 0.06) 0 16%, transparent 34%, rgba(0, 0, 0, 0.22) 66%, rgba(0, 0, 0, 0.82) 100%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.022), transparent 26%, transparent 74%, rgba(255, 255, 255, 0.016));
  }

  #center-stack {
    position: relative;
    z-index: 4;
    width: var(--logo-w);
    max-width: 88vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transform: translateY(-10px);
  }

  #logo-final {
    position: relative;
    z-index: 3;
    width: 100%;
    max-height: 64vh;
    object-fit: contain;
    opacity: 0;
    transform: translate3d(0, 10px, 0) scale(0.982);
    filter: none;
    pointer-events: none;
    user-select: none;
    transition:
      opacity 720ms ease,
      transform 1050ms cubic-bezier(.18,.84,.22,1),
      filter 1050ms ease;
  }

  #logo-final.visible {
    opacity: 1;
    transform: translate3d(0, 0, 0) scale(1);
    filter: none;
    animation: logoBreath 3.8s ease-in-out infinite;
  }

  #loading-panel {
    position: relative;
    width: 100%;
    max-width: 100%;
    margin-top: 2px;
    z-index: 4;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 520ms ease, transform 520ms ease;
  }

  #loading-panel.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #loading-panel.hide {
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
  }

  .progress-track {
    height: 4px;
    width: 100%;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.12);
    box-shadow:
      inset 0 0 10px rgba(255, 255, 255, 0.035),
      0 0 0 1px rgba(255, 255, 255, 0.035);
  }

  #progress-bar {
    position: relative;
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--gold-1), var(--gold-2) 42%, var(--gold-4) 62%, var(--gold-2) 82%, var(--gold-1));
    box-shadow: 0 0 16px rgba(242, 195, 93, .42), 0 0 24px rgba(200, 135, 35, .20);
    transition: width 90ms linear;
  }

  #progress-bar::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .7), transparent);
    transform: translateX(-100%);
    animation: barSheen 1.15s ease-in-out infinite;
  }

  #progress-label {
    min-height: 20px;
    margin-top: 12px;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255, 243, 214, 0.78);
  }


  .heartbeat-wrap {
    width: 100%;
    margin: 0 auto 10px;
    opacity: 0.94;
    filter: drop-shadow(0 0 8px rgba(242, 195, 93, 0.26));
  }

  .heartbeat-line {
    display: block;
    width: 100%;
    height: 28px;
  }

  .heartbeat-base {
    fill: none;
    stroke: rgba(255, 255, 255, 0.10);
    stroke-width: 2;
  }

  .heartbeat-live {
    fill: none;
    stroke: url(#heartbeatGold);
    stroke-width: 2.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    --heartbeat-path-length: 560;
    stroke-dasharray: var(--heartbeat-path-length);
    stroke-dashoffset: var(--heartbeat-path-length);
    filter: drop-shadow(0 0 6px rgba(255, 110, 102, 0.14)) drop-shadow(0 0 10px rgba(242, 195, 93, 0.18));
    animation: heartbeatTrace 2.85s linear infinite;
  }

  #skip-btn {
    position: fixed;
    top: max(18px, env(safe-area-inset-top));
    right: max(18px, env(safe-area-inset-right));
    z-index: 5;
    appearance: none;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.28);
    color: rgba(255, 255, 255, 0.58);
    cursor: pointer;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    line-height: 1;
    padding: 11px 15px;
    text-transform: uppercase;
    transition: color 220ms ease, border-color 220ms ease, background 220ms ease, transform 220ms ease;
    backdrop-filter: blur(10px);
  }

  #skip-btn:hover,
  #skip-btn:focus-visible {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.42);
    background: rgba(255, 255, 255, 0.08);
    transform: translateY(-1px);
    outline: none;
  }

  #sample-canvas { display: none; }

  .no-webgl #logo-final,
  .reduced-motion #logo-final {
    opacity: 1;
    transform: translate3d(0, 0, 0) scale(1);
  }

  @keyframes barSheen {
    from { transform: translateX(-120%); opacity: 0.25; }
    45% { opacity: 1; }
    to { transform: translateX(120%); opacity: 0.3; }
  }

  @keyframes heartbeatTrace {
    from { stroke-dashoffset: var(--heartbeat-path-length); }
    to { stroke-dashoffset: 0; }
  }

  @keyframes logoBreath {
    0%, 100% {
      transform: translate3d(0, 0, 0) scale(1);
      filter: none;
    }
    50% {
      transform: translate3d(0, -1px, 0) scale(1.012);
      filter: drop-shadow(0 0 10px rgba(242, 195, 93, 0.08));
    }
  }

  @media (max-width: 640px) {
    :root { --logo-w: 68vw; }
    #center-stack { transform: translateY(-6px); }
    #progress-label { font-size: 12px; letter-spacing: 0.14em; }
    #skip-btn { padding: 10px 13px; font-size: 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-iteration-count: 1 !important;
    }
  }
</style>
</head>
<body>
<div id="splash" aria-label="Drovik Fitness loading screen">
  <canvas id="gl-canvas"></canvas>
  <div id="ambient-vignette" aria-hidden="true"></div>
  <div id="center-stack">
    <img id="logo-final" alt="Drovik Fitness" />
    <div id="loading-panel" aria-hidden="true">
    <div class="heartbeat-wrap" aria-hidden="true">
      <svg class="heartbeat-line" viewBox="0 0 520 34" preserveAspectRatio="none">
        <defs>
          <linearGradient id="heartbeatGold" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#8a550d"></stop>
            <stop offset="28%" stop-color="#ebb955"></stop>
            <stop offset="47%" stop-color="#ff9a82"></stop>
            <stop offset="53%" stop-color="#ff6e66"></stop>
            <stop offset="60%" stop-color="#ffd5b0"></stop>
            <stop offset="74%" stop-color="#fff0ae"></stop>
            <stop offset="100%" stop-color="#bd7f1f"></stop>
          </linearGradient>
        </defs>
        <path class="heartbeat-base" d="M0,18 L62,18 L86,18 L100,16 L112,18 L128,18 L150,18 L168,18 L182,6 L196,29 L212,9 L228,18 L278,18 L306,18 L320,16 L332,18 L350,18 L374,18 L389,8 L402,24 L418,13 L434,18 L520,18" />
        <path class="heartbeat-live" d="M0,18 L62,18 L86,18 L100,16 L112,18 L128,18 L150,18 L168,18 L182,6 L196,29 L212,9 L228,18 L278,18 L306,18 L320,16 L332,18 L350,18 L374,18 L389,8 L402,24 L418,13 L434,18 L520,18" />
      </svg>
    </div>
    <div id="progress-label">Preparing your session</div>
    </div>
  </div>
  <canvas id="sample-canvas"></canvas>

  <button id="skip-btn" type="button" aria-label="Skip intro animation">Skip</button>
</div>

  const bgFragmentSource = `
    precision mediump float;
    varying vec2 vUv;
    uniform vec2 uResolution;
    uniform float uTime;
    uniform float uProgress;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
    }

    float softLine(vec2 uv, float offset, float width) {
      float d = abs(uv.y - (0.54 - uv.x * 0.14 + offset));
      return smoothstep(width, 0.0, d);
    }

    void main() {
      vec2 uv = vUv;
      vec2 p = uv - 0.5;
      p.x *= uResolution.x / uResolution.y;

      vec3 goldDark = vec3(0.52, 0.32, 0.06);
      vec3 gold = vec3(0.95, 0.76, 0.36);
      vec3 goldLight = vec3(1.00, 0.94, 0.71);
      vec3 col = vec3(0.010, 0.009, 0.008);

      float pulse = 0.5 + 0.5 * sin(uTime * 1.55);
      float orbBlue = exp(-5.0 * length(p - vec2(-0.55 + 0.08 * sin(uTime * 0.33), -0.24 + 0.05 * cos(uTime * 0.47))));
      float orbYellow = exp(-5.6 * length(p - vec2(0.56 + 0.06 * cos(uTime * 0.38), 0.28 + 0.04 * sin(uTime * 0.44))));
      float centreGlow = exp(-4.2 * length(p));

      float sweep = softLine(uv, sin(uTime * 0.85) * 0.035, 0.038);
      float sweepFine = softLine(uv, -0.10 + fract(uTime * 0.075) * 0.20, 0.010);

      float gridX = smoothstep(0.020, 0.0, abs(fract((uv.x + uTime * 0.006) * 28.0) - 0.5));
      float gridY = smoothstep(0.020, 0.0, abs(fract((uv.y - uTime * 0.004) * 18.0) - 0.5));
      float grid = (gridX + gridY) * 0.020;

      float grain = hash(floor((uv * uResolution.xy + uTime * 19.0) * 0.55)) * 0.018;
      float scan = (sin((uv.y + uTime * 0.035) * uResolution.y * 0.62) * 0.5 + 0.5) * 0.012;
      float vignette = smoothstep(1.08, 0.23, length(p));

      col += goldDark * orbBlue * (0.18 + 0.07 * pulse);
      col += gold * orbYellow * (0.18 + 0.07 * (1.0 - pulse));
      col += mix(goldDark, goldLight, uv.x) * centreGlow * 0.038;
      col += mix(goldDark, goldLight, uv.x) * sweep * (0.050 + 0.032 * uProgress);
      col += goldLight * sweepFine * 0.035;
      col += vec3(grid + grain + scan);
      col *= vignette;

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  const particleVertexSource = `
    attribute vec2 aOrigin;
    attribute vec2 aTarget;
    attribute vec3 aColor;
    attribute float aDelay;
    attribute float aSize;
    attribute float aSeed;

    uniform float uProgress;
    uniform float uTime;
    uniform float uDpr;
    uniform float uParticleFade;
    uniform vec2 uPointer;

    varying vec3 vColor;
    varying float vAlpha;

    float easeOutCubic(float t) {
      return 1.0 - pow(1.0 - t, 3.0);
    }

    float easeOutBack(float t) {
      float c1 = 1.70158;
      float c3 = c1 + 1.0;
      return 1.0 + c3 * pow(t - 1.0, 3.0) + c1 * pow(t - 1.0, 2.0);
    }

    void main() {
      float p = clamp((uProgress - aDelay) / max(0.001, 1.0 - aDelay), 0.0, 1.0);
      float eased = mix(easeOutCubic(p), clamp(easeOutBack(p), 0.0, 1.04), 0.18);

      vec2 direction = aTarget - aOrigin;
      vec2 tangent = normalize(vec2(-direction.y, direction.x) + 0.0001);

      float lift = sin(p * 3.14159265) * 0.030 * (1.0 - p);
      vec2 swirl = tangent * sin(uTime * 1.4 + aSeed * 6.2831) * lift;
      vec2 breathing = vec2(
        sin(uTime * 0.88 + aTarget.x * 17.0 + aSeed * 5.0),
        cos(uTime * 0.72 + aTarget.y * 15.0 - aSeed * 3.0)
      ) * 0.0018 * p;
      vec2 pointerPull = uPointer * mix(0.014, 0.0035, p);
      vec2 pos = mix(aOrigin, aTarget, eased) + swirl + breathing + pointerPull;

      gl_Position = vec4(pos, 0.0, 1.0);
      gl_PointSize = aSize * uDpr * mix(2.05, 0.75, p) * max(0.18, uParticleFade);

      vColor = aColor;
      vAlpha = smoothstep(0.02, 0.16, p) * mix(0.55, 1.0, p) * uParticleFade;
    }
  `;

  function createShader(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      const message = gl.getShaderInfoLog(shader);
      gl.deleteShader(shader);
      throw new Error(message || 'Shader compile failed');
    }
    return shader;
  }

  function createProgram(vertexSource, fragmentSource) {
    const vertexShader = createShader(gl.VERTEX_SHADER, vertexSource);
    const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentSource);
    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    gl.deleteShader(vertexShader);
    gl.deleteShader(fragmentShader);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      const message = gl.getProgramInfoLog(program);
      gl.deleteProgram(program);
      throw new Error(message || 'Program link failed');
    }
    return program;
  }

  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const width = Math.max(1, Math.floor(window.innerWidth * dpr));
    const height = Math.max(1, Math.floor(window.innerHeight * dpr));

    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
      gl.viewport(0, 0, width, height);
    }
  }

  function uploadAttribute(program, name, data, size) {
    const location = gl.getAttribLocation(program, name);
    if (location < 0) return;
    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(location);
    gl.vertexAttribPointer(location, size, gl.FLOAT, false, 0, 0);
    particleBuffers[name] = buffer;
  }

  function bindParticleAttribute(name, size) {
    const location = gl.getAttribLocation(particleProgram, name);
    const buffer = particleBuffers[name];
    if (location < 0 || !buffer) return;
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.enableVertexAttribArray(location);
    gl.vertexAttribPointer(location, size, gl.FLOAT, false, 0, 0);
  }

  function random(min, max) {
    return min + Math.random() * (max - min);
  }

  function energyOrigin(tx, ty, xRatio) {
    const mode = Math.random();
    if (mode < 0.46) return [tx + random(-0.24, 0.24), -1.15 - Math.random() * 0.24];
    if (mode < 0.74) return [random(-1.22, 1.22), ty + random(-0.34, 0.34)];
    return [xRatio < 0.5 ? -1.18 - Math.random() * 0.20 : 1.18 + Math.random() * 0.20, ty + random(-0.22, 0.22)];
  }

  function colourPolish(r, g, b) {
    // Cleaned logo colours are already strong. This only adds a small electric lift.
    const max = Math.max(r, g, b);
    const lift = max > 230 ? 1.04 : 1.08;
    return [
      Math.min(1, (r / 255) * lift + 0.010),
      Math.min(1, (g / 255) * lift + 0.008),
      Math.min(1, (b / 255) * lift + 0.012)
    ];
  }

    const sampleH = logoSampleH + lineZoneH + textZoneH + Math.round(logoSampleW * 0.035);

    const maxParticles = mobile ? CONFIG.maxParticlesMobile : CONFIG.maxParticlesDesktop;

    sampleCanvas.width = sampleW;
    sampleCanvas.height = sampleH;
    sampleCtx.clearRect(0, 0, sampleW, sampleH);

    sampleCtx.drawImage(img, 0, 0, logoSampleW, logoSampleH);

    const lineY = logoSampleH + Math.round(lineZoneH * 0.42);
    const textY = lineY + Math.round(textZoneH * 0.9);

    const gradient = sampleCtx.createLinearGradient(0, lineY, sampleW, lineY);
    gradient.addColorStop(0, '#8a550d');
    gradient.addColorStop(0.40, '#ebb955');
    gradient.addColorStop(0.60, '#fff0ae');
    gradient.addColorStop(1.0, '#bd7f1f');

    sampleCtx.strokeStyle = gradient;
    sampleCtx.lineWidth = Math.max(2, Math.round(sampleW * 0.004));
    sampleCtx.lineCap = 'round';
    sampleCtx.lineJoin = 'round';
    sampleCtx.beginPath();
    const points = [
      [0.00, 0],[0.12, 0],[0.165, 0],[0.192, -2],[0.215, 0],[0.246, 0],[0.288, 0],
      [0.323, 0],[0.35, -12],[0.377, 14],[0.408, -9],[0.438, 0],[0.535, 0],[0.588, 0],
      [0.615, -2],[0.638, 0],[0.673, 0],[0.719, 0],[0.748, -10],[0.773, 12],[0.804, -5],[0.835, 0],[1.00, 0]
    ];
    points.forEach((pt, i) => {
      const px = pt[0] * sampleW;
      const py = lineY + pt[1] * (sampleW / 520);
      if (i === 0) sampleCtx.moveTo(px, py);
      else sampleCtx.lineTo(px, py);
    });
    sampleCtx.stroke();

    sampleCtx.font = `800 ${Math.max(18, Math.round(sampleW * 0.035))}px Arial`;
    sampleCtx.fillStyle = 'rgba(255,243,214,0.95)';
    sampleCtx.textAlign = 'center';
    sampleCtx.textBaseline = 'alphabetic';
    sampleCtx.fillText(loadingMessages[0].toUpperCase(), sampleW / 2, textY);

    const imageData = sampleCtx.getImageData(0, 0, sampleW, sampleH).data;
    const candidates = [];

    for (let y = 0; y < sampleH; y += step) {
      for (let x = 0; x < sampleW; x += step) {
        const index = (y * sampleW + x) * 4;
        const a = imageData[index + 3];
        if (a < 86) continue;

        const r = imageData[index];
        const g = imageData[index + 1];
        const b = imageData[index + 2];
        const brightness = (r + g + b) / 3;
        candidates.push([x, y, r, g, b, a, brightness]);
      }
    }

    const stride = Math.max(1, Math.ceil(candidates.length / maxParticles));
    const selected = [];
    for (let i = 0; i < candidates.length; i += stride) selected.push(candidates[i]);

    particleCount = selected.length;

    const origins = new Float32Array(particleCount * 2);
    const targets = new Float32Array(particleCount * 2);
    const colours = new Float32Array(particleCount * 3);
    const delays = new Float32Array(particleCount);
    const sizes = new Float32Array(particleCount);
    const seeds = new Float32Array(particleCount);

    const viewportW = window.innerWidth;
    const viewportH = window.innerHeight;
    const compositeAspect = sampleW / sampleH;
    let displayW = Math.min(viewportW * (mobile ? 0.93 : 0.88), 1040);
    let displayH = displayW / compositeAspect;

    if (displayH > viewportH * 0.76) {
      displayH = viewportH * 0.76;
      displayW = displayH * compositeAspect;
    }

    displayLogoWidth = Math.round(displayW);
    centerStack.style.width = `${displayLogoWidth}px`;
    logoFinal.style.width = `${displayLogoWidth}px`;

    for (let i = 0; i < particleCount; i++) {
      const [x, y, r, g, b, a, brightness] = selected[i];
      const xRatio = x / sampleW;
      const yRatio = y / sampleH;
      const tx = (xRatio - 0.5) * (displayW / viewportW) * 2;
      const ty = -(yRatio - 0.5) * (displayH / viewportH) * 2;
      const [ox, oy] = energyOrigin(tx, ty, xRatio);
      const [cr, cg, cb] = colourPolish(r, g, b);

      origins[i * 2] = ox;
      origins[i * 2 + 1] = oy;
      targets[i * 2] = tx;
      targets[i * 2 + 1] = ty;
      colours[i * 3] = cr;
      colours[i * 3 + 1] = cg;
      colours[i * 3 + 2] = cb;

      const horizontalWave = xRatio * 0.34;
      const verticalWeight = yRatio * 0.08;
      const edgeSoftness = (1.0 - a / 255) * 0.035;
      delays[i] = Math.min(0.72, 0.025 + horizontalWave + verticalWeight + edgeSoftness + Math.random() * 0.15);
      sizes[i] = mobile
        ? (1.38 + Math.random() * 1.20 + (a / 255) * 0.38)
        : (1.08 + Math.random() * 1.36 + brightness / 255 * 0.50 + (a / 255) * 0.30);
      seeds[i] = Math.random();
    }

    Object.values(particleBuffers).forEach(buffer => gl.deleteBuffer(buffer));
    particleBuffers = {};

    gl.useProgram(particleProgram);
    uploadAttribute(particleProgram, 'aOrigin', origins, 2);
    uploadAttribute(particleProgram, 'aTarget', targets, 2);
    uploadAttribute(particleProgram, 'aColor', colours, 3);
    uploadAttribute(particleProgram, 'aDelay', delays, 1);
    uploadAttribute(particleProgram, 'aSize', sizes, 1);
    uploadAttribute(particleProgram, 'aSeed', seeds, 1);
  }

  function setLoadingMessage(index) {
    loadingMessageIndex = (index + loadingMessages.length) % loadingMessages.length;
    progressLabel.textContent = loadingMessages[loadingMessageIndex];
  }

  function startLoadingMessageLoop() {
    if (loadingMessageTimer) return;
    setLoadingMessage(0);
    loadingMessageTimer = window.setInterval(() => {
      setLoadingMessage(loadingMessageIndex + 1);
    }, 1650);
  }

  function finishSplash() {
    if (complete) return;
    const renderedParticleCount = particleCount;
    complete = true;
    if (progressBar) progressBar.style.width = '100%';
    logoFinal.classList.add('visible');
    loadingPanel.classList.add('visible');
    startLoadingMessageLoop();

    // Hard stop the particle layer so there is no glowing outline left around the logo.
    particleCount = 0;

    window.parent?.postMessage({ type: 'drovik:splash-complete' }, '*');
    window.dispatchEvent(new CustomEvent(CONFIG.finalEventName, {
      detail: { source: 'refined-webgl-splash-clean-final', particleCount: renderedParticleCount }
    }));
  }

  function updateProgressUI(progress) {
    const displayProgress = Math.min(100, Math.round((0.06 + progress * 0.94) * 100));
    if (progressBar) progressBar.style.width = `${displayProgress}%`;
  }

  function smoothstep(edge0, edge1, value) {
    const t = Math.max(0, Math.min(1, (value - edge0) / Math.max(0.0001, edge1 - edge0)));
    return t * t * (3 - 2 * t);
  }

  function drawBackground(timeSeconds, progress) {
    gl.disable(gl.BLEND);
    gl.useProgram(bgProgram);
    gl.bindBuffer(gl.ARRAY_BUFFER, bgBuffer);
    const positionLocation = gl.getAttribLocation(bgProgram, 'aPosition');
    gl.enableVertexAttribArray(positionLocation);
    gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(uniforms.bg.uResolution, canvas.width, canvas.height);
    gl.uniform1f(uniforms.bg.uTime, timeSeconds);
    gl.uniform1f(uniforms.bg.uProgress, progress);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }

  function drawParticles(timeSeconds, progress) {
    if (!particleCount || complete) return;
    const particleFade = 1 - smoothstep(CONFIG.particleFadeStart, CONFIG.particleFadeEnd, progress);
    if (particleFade <= 0.015) return;

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    gl.useProgram(particleProgram);
    bindParticleAttribute('aOrigin', 2);
    bindParticleAttribute('aTarget', 2);
    bindParticleAttribute('aColor', 3);
    bindParticleAttribute('aDelay', 1);
    bindParticleAttribute('aSize', 1);
    bindParticleAttribute('aSeed', 1);
    gl.uniform1f(uniforms.particle.uProgress, progress);
    gl.uniform1f(uniforms.particle.uTime, timeSeconds);
    gl.uniform1f(uniforms.particle.uDpr, Math.min(window.devicePixelRatio || 1, 2));
    gl.uniform1f(uniforms.particle.uParticleFade, particleFade);
    gl.uniform2f(uniforms.particle.uPointer, pointer.x, pointer.y);
    gl.drawArrays(gl.POINTS, 0, particleCount);
  }

  function render(now) {
    if (!startTime) startTime = now;

    pointer.x += (pointer.tx - pointer.x) * 0.055;
    pointer.y += (pointer.ty - pointer.y) * 0.055;

    const elapsed = now - startTime;
    const progress = complete ? 1 : Math.min(1, elapsed / CONFIG.animationMs);
    const timeSeconds = now * 0.001;

    resizeCanvas();
    updateProgressUI(progress);

    if (!complete && progress >= CONFIG.logoRevealProgress) {
      logoFinal.classList.add('visible');
      loadingPanel.classList.add('visible');
      startLoadingMessageLoop();
    }

    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    drawBackground(timeSeconds, progress);
    drawParticles(timeSeconds, progress);

    if (!complete && progress >= 1) {
      setTimeout(finishSplash, CONFIG.settleDelayMs);
    }

    rafId = requestAnimationFrame(render);
  }

  function initGL() {
    bgProgram = createProgram(bgVertexSource, bgFragmentSource);
    particleProgram = createProgram(particleVertexSource, particleFragmentSource);

    bgBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, bgBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);

    uniforms.bg.uResolution = gl.getUniformLocation(bgProgram, 'uResolution');
    uniforms.bg.uTime = gl.getUniformLocation(bgProgram, 'uTime');
    uniforms.bg.uProgress = gl.getUniformLocation(bgProgram, 'uProgress');

    uniforms.particle.uProgress = gl.getUniformLocation(particleProgram, 'uProgress');
    uniforms.particle.uTime = gl.getUniformLocation(particleProgram, 'uTime');
    uniforms.particle.uDpr = gl.getUniformLocation(particleProgram, 'uDpr');
    uniforms.particle.uParticleFade = gl.getUniformLocation(particleProgram, 'uParticleFade');
    uniforms.particle.uPointer = gl.getUniformLocation(particleProgram, 'uPointer');
  }

  function loadLogo() {
    const img = new Image();
    img.onload = () => {
      buildParticlesFromImage(img);
      startTime = performance.now();
      rafId = requestAnimationFrame(render);
    };
    img.onerror = () => {
      splash.classList.add('no-webgl');
      logoFinal.classList.add('visible');
      loadingPanel.classList.add('visible');
      startLoadingMessageLoop();
      setTimeout(finishSplash, 9000);
    };
    img.src = LOGO_SRC;
  }

  function restartForResize() {
    const now = Date.now();
    if (now - lastRebuild < 260) return;
    lastRebuild = now;
    resizeCanvas();
    if (complete) return;

    const img = new Image();
    img.onload = () => buildParticlesFromImage(img);
    img.src = LOGO_SRC;
  }

  skipBtn.addEventListener('click', finishSplash);

  window.addEventListener('pointermove', event => {
    pointer.tx = (event.clientX / window.innerWidth - 0.5) * 0.58;
    pointer.ty = -(event.clientY / window.innerHeight - 0.5) * 0.38;
  }, { passive: true });

  window.addEventListener('resize', restartForResize, { passive: true });

  // App hook: call window.finishDrovikSplash() when your app is ready.
  window.finishDrovikSplash = finishSplash;

  try {
    initGL();
    resizeCanvas();
    loadLogo();
  } catch (error) {
    cancelAnimationFrame(rafId);
    console.warn('Drovik WebGL splash fallback:', error);
    splash.classList.add('no-webgl');
    logoFinal.classList.add('visible');
    loadingPanel.classList.add('visible');
    startLoadingMessageLoop();
  }
})();
</script>
</body>
</html>
