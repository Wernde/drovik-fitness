<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#2E2520"/>
      <stop offset="100%" stop-color="#0D0B0A"/>
    </radialGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD835"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" fill="url(#bg)"/>
  <!-- Dumbbell bar -->
  <rect x="22" y="43" width="56" height="14" rx="4" fill="url(#db)"/>
  <!-- Left collar -->
  <rect x="13" y="35" width="12" height="30" rx="5" fill="url(#db)"/>
  <!-- Left outer plate -->
  <rect x="4" y="40" width="11" height="20" rx="3" fill="url(#db)"/>
  <!-- Right collar -->
  <rect x="75" y="35" width="12" height="30" rx="5" fill="url(#db)"/>
  <!-- Right outer plate -->
  <rect x="85" y="40" width="11" height="20" rx="3" fill="url(#db)"/>
  <!-- Shine highlight on bar -->
  <rect x="22" y="43" width="56" height="5" rx="2" fill="rgba(255,255,255,0.20)"/>
  <!-- Shine highlight on plates -->
  <rect x="4" y="40" width="11" height="5" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="85" y="40" width="11" height="5" rx="2" fill="rgba(255,255,255,0.15)"/>
</svg>
